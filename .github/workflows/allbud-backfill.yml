name: AllBud Backfill (helpsWith tags)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  allbud:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run AllBud backfill
        run: python scripts/update_strains.py --allbud

      - name: Commit updated strains.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add strains.json
          git diff --cached --quiet || git commit -m "AllBud backfill — helpsWith tags"
          git push
