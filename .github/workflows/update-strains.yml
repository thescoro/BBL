# =============================================================================
# Bloomy's Bud Log — Auto-Update Strains (Playwright Edition)
# =============================================================================
# Runs daily (6am UTC) using a headless browser to scrape
# MedBud.wiki's JS-rendered strain pages for full data including terpenes.
#
# Can also be triggered manually from the Actions tab.
# =============================================================================

name: Update Strain Data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-strains:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 requests
          playwright install chromium
          playwright install-deps chromium

      - name: Run strain updater
        run: python scripts/update_strains.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Bloomy's Bot"
          git config user.email "bot@bloomys-bud-log.github.io"
          git add strains.json reviews.json index.html
          STRAIN_COUNT=$(python -c "import json; print(len(json.load(open('strains.json'))))")
          REVIEW_COUNT=$(python -c "import json; print(len(json.load(open('reviews.json'))))" 2>/dev/null || echo "0")
          git commit -m "🌿 Auto-update: $STRAIN_COUNT strains, $REVIEW_COUNT reviews"
          git push

      - name: No changes detected
        if: steps.changes.outputs.changed == 'false'
        run: echo "✅ No new strain data — everything is up to date."
